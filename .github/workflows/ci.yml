name: CI – Lint, Deploy & Smoke Test

# Component versions in use (all open-source):
#   apache/kafka                      3.9.0   Apache-2.0
#   quay.io/kroxylicious/kroxylicious  0.9.0   Apache-2.0
#   danielqsj/kafka-exporter          v1.9.0  Apache-2.0
#   prom/prometheus                   v3.2.1  Apache-2.0
#   grafana/grafana                   11.5.0  AGPL-3.0

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint yamllint

      - name: Lint Ansible playbooks and roles
        run: ansible-lint playbooks/site.yml || true

      - name: Validate YAML files
        run: |
          yamllint -d relaxed \
            docker-compose.yml \
            config/kroxylicious/kroxylicious.yaml \
            config/prometheus/prometheus.yml \
            config/grafana/provisioning/datasources/prometheus.yml \
            config/grafana/provisioning/dashboards/dashboard.yml \
            playbooks/site.yml \
            inventories/prod/group_vars/all.yml

      - name: Lint shell scripts
        run: |
          find scripts/ -name "*.sh" -exec bash -n {} \; -print

  # ── Deploy & Smoke Test ───────────────────────────────────────────────────
  smoke-test:
    name: Deploy + Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Generate TLS certificates
        run: bash scripts/generate-certs.sh

      - name: Start Docker Compose stack
        run: docker compose up -d

      - name: Wait for Kafka brokers to be healthy
        run: |
          for broker in kafka1 kafka2 kafka3; do
            echo "Waiting for $broker..."
            for i in $(seq 1 36); do
              status=$(docker inspect -f '{{.State.Health.Status}}' $broker 2>/dev/null || echo "unknown")
              if [ "$status" = "healthy" ]; then
                echo "$broker is healthy"
                break
              fi
              if [ "$i" -eq 36 ]; then
                echo "$broker did not become healthy in time"
                docker logs $broker --tail 50
                exit 1
              fi
              sleep 5
            done
          done

      - name: Wait for Kroxylicious to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:9000/healthz 2>/dev/null; then
              echo "Kroxylicious is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Kroxylicious did not become ready in time"
              docker logs kroxylicious --tail 30
              exit 1
            fi
            sleep 3
          done

      - name: Wait for Prometheus to be ready
        run: |
          for i in $(seq 1 18); do
            if curl -sf http://localhost:9090/-/ready 2>/dev/null | grep -q "Prometheus"; then
              echo "Prometheus is ready"
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "Prometheus did not become ready in time"
              docker logs prometheus --tail 30
              exit 1
            fi
            sleep 5
          done

      - name: Show stack status
        run: docker compose ps

      - name: Run smoke test suite
        run: bash scripts/kafka-smoke-test.sh

      - name: Verify Prometheus scraped Kroxylicious metrics
        run: |
          echo "=== Prometheus targets ==="
          curl -sf http://localhost:9090/api/v1/targets | python3 -m json.tool | grep -E '"health"|"scrapeUrl"' || true
          echo "=== Kroxylicious metrics via Prometheus ==="
          curl -sf "http://localhost:9090/api/v1/query?query=jvm_memory_used_bytes" | python3 -m json.tool || true

      - name: Verify kafka-exporter metrics
        run: |
          echo "=== Kafka brokers metric ==="
          curl -sf "http://localhost:9090/api/v1/query?query=kafka_brokers" | python3 -m json.tool || true
          echo "=== Kafka topic partitions ==="
          curl -sf "http://localhost:9090/api/v1/query?query=kafka_topic_partitions" | python3 -m json.tool || true

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== kafka1 logs        ===" && docker logs kafka1        --tail 100 || true
          echo "=== kafka2 logs        ===" && docker logs kafka2        --tail 100 || true
          echo "=== kafka3 logs        ===" && docker logs kafka3        --tail 100 || true
          echo "=== kroxylicious logs  ===" && docker logs kroxylicious  --tail 100 || true
          echo "=== kafka-ui logs      ===" && docker logs kafka-ui       --tail 50  || true
          echo "=== prometheus         ===" && docker logs prometheus    --tail 50  || true
          echo "=== grafana            ===" && docker logs grafana        --tail 50  || true
          echo "=== Kroxylicious metrics ===" && curl -sf http://localhost:9000/metrics || true

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans
