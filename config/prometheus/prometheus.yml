# ─────────────────────────────────────────────────────────────────────────────
# DOCKER REFERENCE CONFIG — used only when running docker-compose.yml
# For bare-metal deployments, Prometheus config is generated by the Ansible
# prometheus role from: roles/prometheus/templates/prometheus.yml.j2
# That template substitutes real inventory hostnames/IPs automatically.
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Kroxylicious admin server exposes Prometheus metrics at /metrics.
  # Includes per-virtual-cluster connection counts, Kafka protocol request/response
  # counters, and JVM metrics.
  - job_name: kroxylicious
    static_configs:
      - targets: ['kroxylicious:9000']
    metrics_path: /metrics

  # kafka-exporter speaks the Kafka protocol to the brokers directly over the
  # internal plaintext network and surfaces broker/topic/consumer-group metrics.
  - job_name: kafka
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Envoy admin — retained as reference scrape target (disabled by default).
  # Uncomment if running the Envoy-based deployment (docker-compose-envoy.yml).
  # - job_name: envoy
  #   static_configs:
  #     - targets: ['envoy:9901']
  #   metrics_path: /stats/prometheus
