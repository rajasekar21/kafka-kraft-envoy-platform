global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Envoy admin API exposes all stats in Prometheus format at /stats/prometheus.
  # Includes per-listener downstream connections, per-cluster upstream connections,
  # and kafka_broker filter request/response counters.
  - job_name: envoy
    static_configs:
      - targets: ['envoy:9901']
    metrics_path: /stats/prometheus

  # kafka-exporter speaks the Kafka protocol to the brokers directly over the
  # internal plaintext network and surfaces broker/topic/consumer-group metrics.
  - job_name: kafka
    static_configs:
      - targets: ['kafka-exporter:9308']
