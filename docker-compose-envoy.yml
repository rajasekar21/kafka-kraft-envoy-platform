# ─────────────────────────────────────────────────────────────────────────────
# REFERENCE DEPLOYMENT — Envoy-based (kept for documentation purposes)
# Active deployment uses docker-compose.yml (Kroxylicious-based).
# To run this stack: docker compose -f docker-compose-envoy.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
# Architecture:
#   3 Kafka KRaft brokers  – internal PLAINTEXT on :9092, EXTERNAL PLAINTEXT on :9094
#   1 Envoy proxy          – terminates mTLS on :19092-19094, forwards plaintext to each broker's :9094
#   1 kafka-exporter       – Kafka protocol metrics for Prometheus (plaintext via internal network)
#   1 Prometheus           – scrapes Envoy /stats/prometheus + kafka-exporter
#   1 Grafana              – dashboards over Prometheus datasource
#
# Component versions (all latest stable, all open-source):
#   apache/kafka               3.9.0   Apache-2.0
#   envoyproxy/envoy-contrib   v1.33   Apache-2.0
#   danielqsj/kafka-exporter   v1.9.0  Apache-2.0
#   prom/prometheus            v3.2.1  Apache-2.0
#   grafana/grafana            11.5.0  AGPL-3.0

services:
  # ─── Kafka KRaft Cluster ────────────────────────────────────────────────────

  kafka1:
    image: apache/kafka:3.9.0
    hostname: kafka1
    container_name: kafka1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      # Kafka 3.9 StorageTool rejects 0.0.0.0 in CONTROLLER – use hostname (routable)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka1:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:9092,EXTERNAL://envoy:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka1-data:/var/lib/kafka/data
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka1:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s

  kafka2:
    image: apache/kafka:3.9.0
    hostname: kafka2
    container_name: kafka2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka2:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:9092,EXTERNAL://envoy:19093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka2-data:/var/lib/kafka/data
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka2:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s

  kafka3:
    image: apache/kafka:3.9.0
    hostname: kafka3
    container_name: kafka3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka3:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:9092,EXTERNAL://envoy:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka3-data:/var/lib/kafka/data
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka3:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 40s

  # ─── Envoy mTLS Proxy ───────────────────────────────────────────────────────

  envoy:
    image: envoyproxy/envoy-contrib:v1.33-latest
    hostname: envoy
    container_name: envoy
    ports:
      - "19092:19092"   # Broker 1 – mTLS client entry
      - "19093:19093"   # Broker 2 – mTLS client entry
      - "19094:19094"   # Broker 3 – mTLS client entry
      - "9901:9901"     # Envoy admin API + Prometheus /stats/prometheus
    volumes:
      - ./config/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./certs:/etc/envoy/tls:ro
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    networks:
      - kafka-net
    command:
      - /usr/local/bin/envoy
      - -c
      - /etc/envoy/envoy.yaml
      - --log-level
      - info
    healthcheck:
      # envoy-contrib has no curl/wget; bash /dev/tcp TCP open = admin port ready
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/9901"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ─── Kafka Metrics Exporter ─────────────────────────────────────────────────

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka1:9092
      - --kafka.server=kafka2:9092
      - --kafka.server=kafka3:9092
      - --web.listen-address=:9308
      - --log.level=info
    ports:
      - "9308:9308"     # Prometheus scrape endpoint
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    networks:
      - kafka-net
    restart: on-failure

  # ─── Prometheus ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      envoy:
        condition: service_healthy
      kafka-exporter:
        condition: service_started
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready | grep -q 'Prometheus Server is Ready' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ─── Grafana ────────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:11.5.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: kafka123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/kafka-envoy-overview.json
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"database\": \"ok\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
  prometheus-data:
  grafana-data:

networks:
  kafka-net:
    driver: bridge
