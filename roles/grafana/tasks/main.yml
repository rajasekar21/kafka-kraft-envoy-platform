---
- name: Add Grafana APT signing key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana APT repository
  apt_repository:
    repo: "deb [arch=amd64] https://apt.grafana.com stable main"
    state: present
    filename: grafana

- name: Install Grafana
  apt:
    name: "grafana={{ grafana_version }}"
    state: present
    update_cache: yes

- name: Create Grafana dashboards directory
  file:
    path: "{{ grafana_dashboards_dir }}"
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Deploy Grafana datasource provisioning
  template:
    src: datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: grafana
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Deploy Grafana dashboard provisioning
  template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/kafka.yml
    owner: grafana
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Copy Grafana dashboards
  copy:
    src: "{{ item }}"
    dest: "{{ grafana_dashboards_dir }}/"
    owner: grafana
    group: grafana
    mode: "0644"
  with_fileglob:
    - "{{ playbook_dir }}/../config/grafana/dashboards/*.json"
  notify: restart grafana

- name: Configure Grafana (grafana.ini)
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: grafana
    group: grafana
    mode: "0640"
  notify: restart grafana

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started
    daemon_reload: yes

- name: Open Grafana firewall port (UFW)
  ufw:
    rule: allow
    port: "{{ grafana_port }}"
    proto: tcp
  when: ansible_facts.packages['ufw'] is defined or ansible_facts['pkg_mgr'] == 'apt'
