---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - gnupg
      - apt-transport-https
      - ca-certificates
      - net-tools
      - htop
      - vim
      - python3
      - python3-pip
      - openssl
    state: present

- name: Disable swap immediately
  command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: ansible_swaptotal_mb > 0

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+\S+\s+sw\s+.*)$'
    replace: '# \1'

- name: Configure performance sysctl values
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - { key: vm.swappiness,             value: "1" }
    - { key: net.core.rmem_max,         value: "134217728" }
    - { key: net.core.wmem_max,         value: "134217728" }
    - { key: net.ipv4.tcp_rmem,         value: "4096 65536 134217728" }
    - { key: net.ipv4.tcp_wmem,         value: "4096 65536 134217728" }
    - { key: vm.dirty_ratio,            value: "10" }
    - { key: vm.dirty_background_ratio, value: "5" }

- name: Set ulimits for kafka user
  pam_limits:
    domain: kafka
    limit_type: "{{ item.type }}"
    limit_item: "{{ item.item }}"
    value: "{{ item.value }}"
  loop:
    - { type: soft, item: nofile, value: "65536" }
    - { type: hard, item: nofile, value: "65536" }
    - { type: soft, item: nproc,  value: "65536" }
    - { type: hard, item: nproc,  value: "65536" }

- name: Set timezone to UTC
  timezone:
    name: UTC
