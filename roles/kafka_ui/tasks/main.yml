---
- name: Ensure Java 21 (Temurin) is installed
  block:
    - name: Add Adoptium APT key
      apt_key:
        url: https://packages.adoptium.net/artifactory/api/gpg/key/public
        state: present

    - name: Add Adoptium APT repository
      apt_repository:
        repo: "deb [arch=amd64] https://packages.adoptium.net/artifactory/deb {{ ansible_distribution_release }} main"
        state: present
        filename: adoptium

    - name: Install Temurin 21 JRE
      apt:
        name: temurin-21-jre
        state: present
        update_cache: yes

- name: Create kafka-ui system user
  user:
    name: "{{ kafka_ui_user }}"
    system: yes
    shell: /usr/sbin/nologin
    home: "{{ kafka_ui_home }}"
    create_home: no

- name: Create kafka-ui directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ kafka_ui_user }}"
    group: "{{ kafka_ui_user }}"
    mode: "0750"
  loop:
    - "{{ kafka_ui_home }}"
    - "{{ kafka_ui_log_dir }}"

- name: Download kafka-ui JAR
  get_url:
    url: "https://github.com/provectus/kafka-ui/releases/download/v{{ kafka_ui_version }}/kafka-ui-api-v{{ kafka_ui_version }}.jar"
    dest: "{{ kafka_ui_home }}/kafka-ui.jar"
    owner: "{{ kafka_ui_user }}"
    group: "{{ kafka_ui_user }}"
    mode: "0644"
  notify: restart kafka-ui

- name: Deploy kafka-ui systemd service
  template:
    src: kafka-ui.service.j2
    dest: /etc/systemd/system/kafka-ui.service
    mode: "0644"
  notify:
    - reload systemd
    - restart kafka-ui

- name: Enable and start kafka-ui
  systemd:
    name: kafka-ui
    enabled: yes
    state: started
    daemon_reload: yes

- name: Open kafka-ui firewall port (UFW)
  ufw:
    rule: allow
    port: "{{ kafka_ui_port }}"
    proto: tcp
  when: ansible_facts.packages['ufw'] is defined or ansible_facts['pkg_mgr'] == 'apt'
