---
- name: Create kafka-exporter system user
  user:
    name: "{{ kafka_exporter_user }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Download kafka-exporter binary
  get_url:
    url: "https://github.com/danielqsj/kafka_exporter/releases/download/v{{ kafka_exporter_version }}/kafka_exporter-{{ kafka_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/kafka_exporter-{{ kafka_exporter_version }}.tar.gz"
    mode: "0644"

- name: Extract kafka-exporter binary
  unarchive:
    src: "/tmp/kafka_exporter-{{ kafka_exporter_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    extra_opts: ["--strip-components=1"]
    include:
      - "kafka_exporter-{{ kafka_exporter_version }}.linux-amd64/kafka_exporter"
  notify: restart kafka-exporter

- name: Set kafka-exporter binary permissions
  file:
    path: /usr/local/bin/kafka_exporter
    owner: root
    group: root
    mode: "0755"

- name: Deploy kafka-exporter systemd service
  template:
    src: kafka-exporter.service.j2
    dest: /etc/systemd/system/kafka-exporter.service
    mode: "0644"
  notify:
    - reload systemd
    - restart kafka-exporter

- name: Enable and start kafka-exporter
  systemd:
    name: kafka-exporter
    enabled: yes
    state: started
    daemon_reload: yes
